{% extends "layout.html" %}

{% block content %}

<div class="admin-container">

<h1 class="title">🎮 Manage Games</h1>

<div class="top-bar">

<a href="/admin/add_game" class="add-btn">➕ Add Game</a>

<a href="/admin/dashboard" class="back-btn">⬅ Back to Dashboard</a>

</div>

<div class="games-grid">

{% for game in games %}

<div class="game-card">

<img src="{{ url_for('static', filename='images/games/' + (game.image or 'default.jpg')) }}" class="game-img"> 
>

<div class="game-info">

<h3>{{game.name}}</h3>

<p><b>System:</b> {{game.system}}</p>

<p><b>Price:</b> ₹{{game.price}} / hr</p>

</div>

<div class="game-actions">

 <a href="/admin/upload_image/{{ game.id }}" class="btn btn-primary btn-sm">
                        Upload Image
                    </a>

<a href="/admin/delete_game/{{game.id}}" class="delete-btn">
Delete
</a>

</div>

</div>

{% endfor %}

</div>

</div>

<style>

.admin-container{
padding:40px;
color:white;
}

.title{
text-align:center;
font-size:36px;
margin-bottom:30px;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.add-btn{
background:#00ffff;
padding:12px 20px;
text-decoration:none;
color:black;
font-weight:bold;
border-radius:6px;
}

.back-btn{
background:#333;
padding:12px 20px;
text-decoration:none;
color:white;
border-radius:6px;
}

.games-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.game-card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px #0ff;
}

.game-img{
width:100%;
height:180px;
object-fit:cover;
}

.game-info{
padding:15px;
}

.game-info h3{
margin-bottom:10px;
}

.game-actions{
padding:10px;
text-align:center;
}

.delete-btn{
background:red;
padding:8px 15px;
color:white;
text-decoration:none;
border-radius:5px;
}

</style>

{% endblock %}
