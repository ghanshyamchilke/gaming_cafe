{% extends "layout.html" %}

{% block content %}

<div class="card">

<h2>Login</h2>

<form method="POST">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

<p>New user? <a href="/register">Register</a></p>

</div>

{% endblock %}
